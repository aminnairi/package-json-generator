name: Elm CI

on:
    push:
        branch:
            - latest

    pull_request:
        branch:
            - latest

jobs:
    elm-format:
        runs-on: ubuntu-latest
        name: Elm Format

        steps:
            - name: Git Checkout
              uses: actions/checkout@v2

            - name: Elm Syntax Validation
              run: make format
